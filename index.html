<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Midnight Club</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #111;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    /* ── CLICK TO ENTER ── */
    #enter-screen {
      position: fixed;
      inset: 0;
      z-index: 30;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: opacity 1s ease;
    }

    #enter-screen.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    #enter-screen span {
      color: rgba(255,255,255,0.3);
      font-size: 0.65rem;
      letter-spacing: 0.5em;
      text-transform: uppercase;
    }

    /* ── VIDEO ── */
    #video-screen {
      position: fixed;
      inset: 0;
      z-index: 20;
      background: #000;
      opacity: 1;
      transition: opacity 3s ease;
    }

    #video-screen.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    #intro-video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* ── PASSCODE SCREEN ── */
    #passcode-screen {
      position: fixed;
      inset: 0;
      z-index: 10;
      background-color: #fff;
      background-image: url('logo-password.png');
      background-position: center 40%;
      background-size: 50%;
      background-repeat: no-repeat;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding-bottom: 6vh;
      opacity: 0;
      transition: opacity 3s ease;
    }

    @media (max-width: 768px) {
      #passcode-screen {
        background-size: 85%;
        background-position: center 38%;
      }
    }

    #passcode-screen.visible {
      opacity: 1;
    }

    #passcode-input {
      background: transparent;
      border: none;
      border-bottom: 1px solid rgba(80, 20, 20, 0.6);
      color: #3a1a1a;
      font-size: 1.3rem;
      letter-spacing: 0.5em;
      text-align: center;
      width: 160px;
      padding: 8px 0;
      outline: none;
      transition: border-color 0.3s;
    }

    #passcode-input::placeholder {
      color: rgba(80,30,30,0.35);
      letter-spacing: 0.3em;
    }

    #passcode-input:focus {
      border-bottom-color: rgba(120, 30, 30, 0.9);
    }

    #passcode-input.error {
      border-bottom-color: #c0392b;
      animation: shake 0.35s ease;
    }

    #passcode-hint {
      margin-top: 10px;
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(60, 20, 20, 0.45);
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25%       { transform: translateX(-7px); }
      75%       { transform: translateX(7px); }
    }

    /* ── MAIN SITE ── */
    #main-site {
      position: fixed;
      inset: 0;
      z-index: 5;
      background: #0f0f0f;
      opacity: 0;
      pointer-events: none;
      transition: opacity 1.6s ease;
      overflow-y: auto;
    }

    #main-site.visible {
      opacity: 1;
      pointer-events: all;
    }

    /* NAV */
    nav {
      position: fixed;
      top: 0;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 24px 48px;
      z-index: 100;
      background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent);
    }

    nav .brand {
      color: #fff;
      font-size: 0.75rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      font-weight: 500;
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 36px;
    }

    nav ul a {
      color: rgba(255,255,255,0.6);
      text-decoration: none;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      transition: color 0.2s;
    }

    nav ul a:hover {
      color: #fff;
    }

    /* HERO */
    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      background: url('logo2.jpg') center center / cover no-repeat;
      position: relative;
    }

    .hero::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.55);
    }

    .hero-content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    .hero h1 {
      color: #fff;
      font-size: clamp(2.5rem, 7vw, 6rem);
      font-weight: 300;
      letter-spacing: 0.3em;
      text-transform: uppercase;
    }

    .hero p {
      color: rgba(255,255,255,0.5);
      font-size: 0.8rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
    }

    .hero-btn {
      margin-top: 12px;
      padding: 14px 40px;
      border: 1px solid rgba(255,255,255,0.4);
      color: #fff;
      text-decoration: none;
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      transition: background 0.3s, border-color 0.3s;
    }

    .hero-btn:hover {
      background: rgba(255,255,255,0.1);
      border-color: #fff;
    }

    /* SECTION LABEL */
    .section-label {
      text-align: center;
      padding: 80px 24px 40px;
      color: rgba(255,255,255,0.2);
      font-size: 0.65rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
    }

    /* GRID */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 2px;
      padding: 0 2px 2px;
    }

    .card {
      background: #1a1a1a;
      aspect-ratio: 3/4;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding: 24px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: background 0.3s;
    }

    .card:hover {
      background: #222;
    }

    .card-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,0.04);
      font-size: 5rem;
      font-weight: 700;
      letter-spacing: 0.1em;
    }

    .card-info {
      position: relative;
      z-index: 2;
      text-align: center;
    }

    .card-info h3 {
      color: rgba(255,255,255,0.8);
      font-size: 0.75rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      font-weight: 400;
    }

    .card-info p {
      margin-top: 6px;
      color: rgba(255,255,255,0.35);
      font-size: 0.7rem;
      letter-spacing: 0.1em;
    }

    /* FOOTER */
    footer {
      text-align: center;
      padding: 60px 24px;
      color: rgba(255,255,255,0.15);
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      border-top: 1px solid rgba(255,255,255,0.05);
      margin-top: 80px;
    }
  </style>
</head>
<body>

  <!-- CLICK TO ENTER -->
  <div id="enter-screen">
    <span>click to enter</span>
  </div>

  <!-- VIDEO -->
  <div id="video-screen">
    <video id="intro-video" playsinline>
      <source src="intro.mov" type="video/mp4">
    </video>
  </div>

  <!-- PASSCODE SCREEN -->
  <div id="passcode-screen">
    <input
      id="passcode-input"
      type="password"
      maxlength="10"
      autocomplete="off"
      spellcheck="false"
      placeholder="· · ·"
    >
    <span id="passcode-hint">enter passcode</span>
  </div>

  <!-- MAIN SITE -->
  <div id="main-site">

    <nav>
      <span class="brand">The Midnight Club</span>
      <ul>
        <li><a href="#">Shop</a></li>
        <li><a href="#">Lookbook</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Contact</a></li>
      </ul>
    </nav>

    <section class="hero">
      <div class="hero-content">
        <p>New Drop — 2026</p>
      </div>
    </section>

    <p class="section-label">— Featured —</p>

    <div class="grid">
      <div class="card">
        <div class="card-placeholder">TMC</div>
        <div class="card-info">
          <h3>Midnight Hoodie</h3>
          <p>$95</p>
        </div>
      </div>
      <div class="card">
        <div class="card-placeholder">TMC</div>
        <div class="card-info">
          <h3>Racing Tee</h3>
          <p>$55</p>
        </div>
      </div>
      <div class="card">
        <div class="card-placeholder">TMC</div>
        <div class="card-info">
          <h3>Club Jacket</h3>
          <p>$160</p>
        </div>
      </div>
      <div class="card">
        <div class="card-placeholder">TMC</div>
        <div class="card-info">
          <h3>Logo Cap</h3>
          <p>$45</p>
        </div>
      </div>
    </div>

    <footer>
      &copy; 2026 The Midnight Club — All Rights Reserved
    </footer>

  </div>

  <script>
    const enterScreen  = document.getElementById('enter-screen');
    const video        = document.getElementById('intro-video');
    const videoScreen  = document.getElementById('video-screen');
    const passcodeScreen = document.getElementById('passcode-screen');
    const passcodeInput  = document.getElementById('passcode-input');
    const mainSite     = document.getElementById('main-site');

    let fadeStarted = false;

    // Click to start — needed for audio autoplay
    enterScreen.addEventListener('click', () => {
      enterScreen.classList.add('fade-out');
      setTimeout(() => enterScreen.remove(), 1000);
      video.play();
    });

    // Click anywhere on video to skip
    videoScreen.addEventListener('click', () => {
      if (!fadeStarted) {
        fadeStarted = true;
        startFade();
      }
    });

    // Start fading 3 seconds before video ends
    video.addEventListener('timeupdate', () => {
      if (!fadeStarted && video.duration && video.currentTime >= video.duration - 3) {
        fadeStarted = true;
        startFade();
      }
    });

    // Fallback: if video ends without timeupdate catching it
    video.addEventListener('ended', () => {
      if (!fadeStarted) startFade();
    });

    // Fallback: if video fails to load
    video.addEventListener('error', () => {
      if (!fadeStarted) startFade();
    });

    function startFade() {
      passcodeScreen.classList.add('visible');
      videoScreen.classList.add('fade-out');
      setTimeout(() => {
        videoScreen.remove();
        passcodeInput.focus();
      }, 3200);
    }

    passcodeInput.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') {
        if (passcodeInput.value.toLowerCase() === 'tmc') {
          passcodeScreen.style.transition = 'opacity 1.6s ease';
          passcodeScreen.style.opacity = '0';
          setTimeout(() => passcodeScreen.remove(), 1700);
          mainSite.classList.add('visible');
        } else {
          passcodeInput.classList.add('error');
          passcodeInput.value = '';
          setTimeout(() => passcodeInput.classList.remove('error'), 500);
        }
      }
    });
  </script>

</body>
</html>
